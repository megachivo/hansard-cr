# Job dedicado: descarga de audio del canal de YouTube → UC Volume.
# Independiente de `daily_pipeline` para poder ejecutarlo a demanda
# (backfills, pruebas, ingesta puntual de una sesión específica).

resources:
  jobs:
    pull_youtube_audio:
      name: "Hansard CR — Pull YouTube Audio"
      description: "Descarga mp3 del canal @AsambleaCRC al UC Volume bronze.raw_files/audio"

      parameters:
        - name: catalog
          default: ${var.catalog}
        # Refer to the deployed resource so dev-mode renaming
        # (e.g. `bronze` → `dev_<user>_bronze`) propagates here.
        - name: schema
          default: ${resources.schemas.bronze.name}
        - name: volume
          default: ${resources.volumes.raw_files.name}
        - name: channel_url
          default: "https://www.youtube.com/@AsambleaCRC/streams"
        - name: max_videos
          default: "10"
        - name: limite_seg
          default: "3600"
        - name: min_duracion_seg
          default: "3600"
        # cookies.txt (Netscape format) from a logged-in browser, uploaded
        # to the UC volume. Needed to bypass YouTube's bot gate on Databricks
        # serverless egress IPs.
        - name: cookies_path
          default: "/Volumes/${var.catalog}/${resources.schemas.bronze.name}/${resources.volumes.raw_files.name}/youtube_cookies.txt"

      tasks:
        - task_key: "pull_audio"
          notebook_task:
            notebook_path: "../../notebooks/02_pull_youtube_audio.py"
            base_parameters:
              catalog: "{{job.parameters.catalog}}"
              schema: "{{job.parameters.schema}}"
              volume: "{{job.parameters.volume}}"
              channel_url: "{{job.parameters.channel_url}}"
              max_videos: "{{job.parameters.max_videos}}"
              limite_seg: "{{job.parameters.limite_seg}}"
              min_duracion_seg: "{{job.parameters.min_duracion_seg}}"
              cookies_path: "{{job.parameters.cookies_path}}"

      max_concurrent_runs: 1
