# Databricks Asset Bundle — Hansard CR
# Despliega: catálogo + notebooks + job + app en un solo comando
# Docs: https://docs.databricks.com/dev-tools/bundles/

bundle:
  name: hansard-cr

include:
  - resources/jobs/*.yml

variables:
  catalog:
    description: "Unity Catalog para todos los datos"
    default: "josesraspoke"
  warehouse_id:
    description: "SQL Warehouse ID para queries del app"
    default: "1b37485f94b66e01"  # llenar con tu warehouse
  vector_search_endpoint:
    description: "Nombre del Vector Search endpoint (compartido entre notebook y app)"
    default: "hansard-cr-endpoint"

resources:
  schemas:
    bronze:
      catalog_name: ${var.catalog}
      name: bronze
      comment: "Raw landing zone: PDFs scrapeados, audio de YouTube, metadata cruda"
    silver:
      catalog_name: ${var.catalog}
      name: silver
      comment: "Datos parseados: intervenciones, transcripciones segmentadas"
    gold:
      catalog_name: ${var.catalog}
      name: gold
      comment: "Curated para Vector Search + dashboard"

  volumes:
    raw_files:
      catalog_name: ${var.catalog}
      schema_name: ${resources.schemas.bronze.name}
      name: raw_files
      volume_type: MANAGED
      comment: "PDFs de actas y mp3 de YouTube. Subpaths: /actas, /audio"

  jobs:
    daily_pipeline:
      name: "Hansard CR — Daily Pipeline"
      tasks:
        - task_key: "scrape_actas"
          notebook_task:
            notebook_path: "./notebooks/01_scrape_actas.py"

        - task_key: "pull_youtube_audio"
          notebook_task:
            notebook_path: "./notebooks/02_pull_youtube_audio.py"
            base_parameters:
              catalog: ${var.catalog}
              schema: ${resources.schemas.bronze.name}
              volume: ${resources.volumes.raw_files.name}
              channel_url: "https://www.youtube.com/@AsambleaCRC/streams"
              max_videos: "10"
              limite_seg: "3600"
              min_duracion_seg: "3600"
              cookies_path: "/Volumes/${var.catalog}/${resources.schemas.bronze.name}/${resources.volumes.raw_files.name}/youtube_cookies.txt"

        - task_key: "transcribe_youtube"
          notebook_task:
            notebook_path: "./notebooks/02_transcribe_youtube.py"
            base_parameters:
              catalog: ${var.catalog}
              schema_bronze: ${resources.schemas.bronze.name}
              schema_silver: ${resources.schemas.silver.name}
              endpoint_name: "hansard-whisper"
              chunk_seg: "30"
              ventana_intervencion_seg: "180"
          depends_on:
            - task_key: "pull_youtube_audio"

        - task_key: "unify_and_embed"
          notebook_task:
            notebook_path: "./notebooks/03_unify_and_embed.py"
            base_parameters:
              catalog: ${var.catalog}
              schema_silver: ${resources.schemas.silver.name}
              schema_gold: ${resources.schemas.gold.name}
              endpoint_name: ${var.vector_search_endpoint}
              embedding_endpoint: "databricks-gte-large-en"
          depends_on:
            - task_key: "transcribe_youtube"
            - task_key: "scrape_actas"

      schedule:
        quartz_cron_expression: "0 0 7 * * ?"  # 7am todos los días
        timezone_id: "America/Costa_Rica"

  apps:
    hansard_cr_app:
      name: "hansard-cr-app"
      description: "Buscador del Plenario de la Asamblea Legislativa CR"
      source_code_path: "./app"
      resources:
        # NOTA: Databricks Apps no expone `vector_search_endpoint` como
        # resource binding. Después de crear el endpoint (job
        # `vector_search_bootstrap`), concedele CAN_USE a la SP del App:
        #   databricks vector-search-endpoints update-permissions \
        #     ${var.vector_search_endpoint} --json '{"access_control_list":[{"service_principal_name":"<app-sp>","permission_level":"CAN_USE"}]}'
        - name: "llm"
          serving_endpoint:
            name: "databricks-meta-llama-3-3-70b-instruct"
            permission: "CAN_QUERY"
        - name: "sql-warehouse"
          sql_warehouse:
            id: ${var.warehouse_id}
            permission: "CAN_USE"

targets:
  # `workspace.host` se toma de la variable de entorno DATABRICKS_HOST
  # (en CI viene del secreto del repo; localmente del perfil de ~/.databrickscfg).
  dev:
    mode: development
    default: true
    workspace:
      host: https://adb-7405613420378213.13.azuredatabricks.net/
      root_path: ~/Shared/.bundle/${bundle.name}/${bundle.target}
  prod:
    mode: production
